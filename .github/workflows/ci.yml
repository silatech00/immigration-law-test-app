name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python modules
        run: |
          python -m py_compile app.py config.py llm_client.py
          python -m py_compile models/user_profile.py
          python -m py_compile services/chat_service.py services/eligibility.py services/storage.py
